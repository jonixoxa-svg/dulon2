# Render Blueprint — https://render.com/docs/blueprint-spec
# Static, single-file site. No build step needed — the files are committed as-is.
# On Render: New > Blueprint > connect this repo, or New > Static Site
# (Publish Directory ".", Build Command empty).
services:
  - type: web
    name: dulon-residence
    runtime: static
    buildCommand: "echo 'static site — no build needed'"
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
